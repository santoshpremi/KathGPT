name: Build installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "website/public/downloads/manifest.json"
      - "website/public/install-windows.ps1"
      - "website/public/downloads/install-windows.ps1"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm tauri build

      - name: Collect Linux installer
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found"
            find src-tauri/target/release/bundle -type f
            exit 1
          fi
          mkdir -p artifacts
          cp "$APPIMAGE" "artifacts/$(basename "$APPIMAGE")"

      - name: Collect Windows installer
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          INSTALLER=$(find src-tauri/target/release/bundle -iname '*-setup.exe' 2>/dev/null | head -1 || true)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find src-tauri/target/release/bundle -iname '*.msi' 2>/dev/null | head -1 || true)
          fi
          if [ -z "$INSTALLER" ]; then
            echo "No Windows installer found"
            find src-tauri/target/release/bundle -type f || true
            exit 1
          fi
          mkdir -p artifacts
          cp "$INSTALLER" "artifacts/$(basename "$INSTALLER")"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: error

  publish-installers:
    needs: build-installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish installers to website
        run: |
          set -euo pipefail
          cp artifacts/* website/public/downloads/
          python3 - <<'PY'
          import json
          from pathlib import Path

          downloads = Path("website/public/downloads")
          manifest_path = downloads / "manifest.json"
          data = json.loads(manifest_path.read_text())

          appimages = sorted(downloads.glob("*.AppImage"))
          if appimages:
              data["platforms"]["linux"] = appimages[-1].name

          windows = sorted(
              list(downloads.glob("*-setup.exe")) + list(downloads.glob("*.msi"))
          )
          if windows:
              data["platforms"]["windows"] = windows[-1].name

          manifest_path.write_text(json.dumps(data, indent=2) + "\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/downloads/
          git diff --staged --quiet && echo "No installer changes to publish" && exit 0
          git commit -m "ci: publish installers for website download"
          git pull --rebase origin main
          git push origin main
