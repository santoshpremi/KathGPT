name: Build installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "website/public/downloads/manifest.json"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: write

concurrency:
  group: build-installers
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm tauri build

      - name: Publish Linux installer to website
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found"
            find src-tauri/target/release/bundle -type f
            exit 1
          fi
          BASENAME=$(basename "$APPIMAGE")
          cp "$APPIMAGE" "website/public/downloads/$BASENAME"
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("website/public/downloads/manifest.json")
          data = json.loads(manifest_path.read_text())
          appimages = sorted(Path("website/public/downloads").glob("*.AppImage"))
          if appimages:
              data["platforms"]["linux"] = appimages[-1].name
          manifest_path.write_text(json.dumps(data, indent=2) + "\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/downloads/
          git diff --staged --quiet || git commit -m "ci: publish Linux AppImage for website download"
          git push
