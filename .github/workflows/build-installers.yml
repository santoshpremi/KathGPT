name: Build installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "website/public/downloads/manifest.json"
      - "website/public/install-windows.ps1"
      - "website/public/downloads/install-windows.ps1"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            args: ""
          - os: windows-latest
            platform: windows
            args: ""
          - os: macos-latest
            platform: mac-arm
            args: "--target aarch64-apple-darwin"
          - os: macos-latest
            platform: mac-intel
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Add macOS Rust targets
        if: startsWith(matrix.platform, 'mac-')
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm tauri build ${{ matrix.args }}

      - name: Collect Linux installer
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found"
            find src-tauri/target/release/bundle -type f
            exit 1
          fi
          mkdir -p artifacts
          cp "$APPIMAGE" "artifacts/$(basename "$APPIMAGE")"

      - name: Collect Windows installer
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          INSTALLER=$(find src-tauri/target/release/bundle -iname '*-setup.exe' 2>/dev/null | head -1 || true)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find src-tauri/target/release/bundle -iname '*.msi' 2>/dev/null | head -1 || true)
          fi
          if [ -z "$INSTALLER" ]; then
            echo "No Windows installer found"
            find src-tauri/target/release/bundle -type f || true
            exit 1
          fi
          mkdir -p artifacts
          cp "$INSTALLER" "artifacts/$(basename "$INSTALLER")"

      - name: Collect macOS installer
        if: startsWith(matrix.platform, 'mac-')
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found"
            find src-tauri/target -name '*.dmg' -o -name '*.app' | head -20 || true
            exit 1
          fi
          mkdir -p artifacts
          cp "$DMG" "artifacts/$(basename "$DMG")"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: error

  publish-installers:
    needs: build-installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish installers to website
        run: |
          set -euo pipefail
          cp artifacts/* website/public/downloads/
          python3 - <<'PY'
          import json
          from pathlib import Path

          downloads = Path("website/public/downloads")
          manifest_path = downloads / "manifest.json"
          data = json.loads(manifest_path.read_text())

          appimages = sorted(downloads.glob("*.AppImage"))
          if appimages:
              data["platforms"]["linux"] = appimages[-1].name

          windows = sorted(
              list(downloads.glob("*-setup.exe")) + list(downloads.glob("*.msi"))
          )
          if windows:
              data["platforms"]["windows"] = windows[-1].name

          mac_arm = sorted(downloads.glob("*aarch64*.dmg"))
          if mac_arm:
              data["platforms"]["mac-arm"] = mac_arm[-1].name

          mac_intel = sorted(
              [p for p in downloads.glob("*.dmg") if "aarch64" not in p.name]
          )
          if mac_intel:
              data["platforms"]["mac-intel"] = mac_intel[-1].name

          manifest_path.write_text(json.dumps(data, indent=2) + "\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/downloads/
          git diff --staged --quiet && echo "No installer changes to publish" && exit 0
          git commit -m "ci: publish installers for website download"
          git pull --rebase origin main
          git push origin main

  deploy-website:
    needs: publish-installers
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Build website
        working-directory: website
        env:
          VITE_GITHUB_REPO: ${{ github.repository }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - uses: actions/deploy-pages@v4
        id: deployment
